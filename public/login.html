<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body id="body2" class="bg-light d-flex align-items-center justify-content-center vh-100">
    <main class="container">
        <div class="row justify-content-center">
            <div class="col-lg-4">
                <div class="card p-4 shadow">
                    <h2 class="text-center mb-4">Login</h2>
                    <form id="FormLogin">
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" id="email" class="form-control" placeholder="Digite seu email">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Senha</label>
                            <input type="password" id="senha" class="form-control" placeholder="Digite sua senha">
                        </div>
                        <button class="btn btn-primary w-100" type="submit">Entrar</button>
                    </form>
                    <div class="text-danger">
                        <p id="problema"></p>
                    </div>

                </div>
            </div>
        </div>
    </main>
   <script src="../script/script.js"></script>
</body>

</html>
