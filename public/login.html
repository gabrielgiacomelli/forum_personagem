<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Bootstrap - biblioteca pronta de estilos (layout, botões, grid, etc) -->
 <link rel="stylesheet" href="../Assets/style.css">
 </head>

<body id="body2" class="bg-light d-flex align-items-center justify-content-center vh-100">
<!-- bg-light: aplica fundo claro padrão do Bootstrap
d-flex: ativa flexbox (organização em linha/coluna)
align-items-center: centraliza verticalmente
justify-content-center: centraliza horizontalmente
vh-100: altura igual a 100% da tela -->

<main class="container">
<!-- container: centraliza o conteúdo e define largura padrão responsiva -->

<div class="row justify-content-center">
<!-- row: linha do sistema de grid do Bootstrap
justify-content-center: centraliza os elementos dentro da linha -->

<div class="col-lg-4">
<!-- col-lg-4: coluna que ocupa 4/12 da tela em telas grandes (layout responsivo) -->

<div class="card p-4 shadow">
<!-- card: componente pronto do Bootstrap (caixa estilizada)
p-4: padding (espaçamento interno grande)
shadow: sombra padrão do Bootstrap -->

<h2 class="text-center mb-4">LOGIN</h2>
<!-- text-center: centraliza o texto
mb-4: margem embaixo (margin-bottom) -->

<form id="FormLogin">

<div class="mb-3">
<!-- mb-3: espaço entre os inputs -->

<label class="form-label">Email</label>
<!-- form-label: estilo padrão de label do Bootstrap -->

<input type="email" id="email" class="form-control" placeholder="Digite seu email">
<!-- form-control: estiliza input (tamanho, borda, padding padrão Bootstrap) -->

</div>

<div class="mb-3">
<label class="form-label">Senha</label>

<input type="password" id="senha" class="form-control" placeholder="Digite sua senha">
<!-- form-control: mantém padrão visual dos inputs -->

</div>

<button class="btn btn-primary w-100" type="submit">Entrar</button>
<!-- btn: classe base de botão
btn-primary: cor principal do Bootstrap
w-100: largura 100% (ocupa toda a linha) -->

</form>

<div class="text-danger">
<!-- text-danger: cor vermelha padrão Bootstrap -->

<p id="problema"></p>

</div>
<script src="../script/script.js"></script>
</body>
</html>
