<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fórum</title>
    <link rel="stylesheet" href="style.css">
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <!-- bg-light → fundo cinza claro -->
     <!-- d-flex → ativa o flexbox -->
      <!-- align-items-center → centraliza verticalmente -->
       <!-- justify-content-center → centraliza horizontalmente -->
        <!-- vh-100 → altura 100% da tela -->
<main class="container">
<!-- container → cria margens laterais e organiza -->
    <!-- Linha do sistema de grid -->
    <div class="row justify-content-center">
        <!-- row → linha do grid -->
         <!-- justify-content-center → centraliza as colunas -->
        <div class="col-lg-4">
            <!-- col-lg-4 = menor no desktop  -->

            <div class="card p-4 shadow">
                <!-- card = cria caixa estilizada -->
                 <!-- p-4 = padding -->
                  <!-- shadow = sombra -->
                <h2 class="text-center mb-4">Login</h2>
                <!-- text-center = centraliza texto -->
                 <!-- mb-4 = margem embaixo -->

                <form>
                    <div class="mb-3">
                        <!-- mb-3 = espaço abaixo -->
                        <label class="form-label">Email</label>
                        <!-- form-label = estilo padrão de label -->
                        <input type="email" class="form-control" placeholder="Digite seu email">
                        <!-- form-control = estilo padrão de input -->
                    </div>

                    <div class="mb-3">
                        <!-- mb-3 = espaço abaixo -->
                        <label class="form-label">Senha</label>
                        <!-- form-label = estilo padrão de label -->
                        <input type="password" class="form-control" placeholder="Digite sua senha">
                        <!-- form-control = estilo padrão de input -->
                    </div>

                    <button class="btn btn-primary w-100">Entrar</button>
                    <!-- btn = estilo de botão -->
                     <!-- btn-primary = cor azul padrão -->
                      <!-- w-100 = largura 100% -->
                </form>

                <div class="text-center mt-3">
                    <!-- text-center = centraliza -->
                     <!-- mt-3 = margem em cima -->
                      <div class="d-flex justify-content-center">
                        <small>Não tem conta? <a href="#">Recuperar senha</a></small><br>
                      </div>
                    <div class="d-flex justify-content-center">
                    <small>Não tem senha? <a href="#">Cadastrar-se</a></small>
                    </div>
                </div>

            </div>
        </div>
    </div>
</main>
</body>
</html>
</body>
</html>
